<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProvedorHealth — Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/estilo.css">
    <link rel="stylesheet" href="./src/css/auth.css">
</head>
<body>

    <!-- HEADER SIMPLES -->
    <header id="header" class="scrolled">
        <a href="index.html" class="logo">Provedor<span>Health</span></a>
        <nav id="mainNav">
            <ul>
                <li><a href="index.html">← Voltar à Loja</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <div class="carrinho" id="carrinhoBtn" onclick="window.location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span id="carrinho-contador">0</span>
            </div>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="auth-page">
        <div class="auth-container">
            <!-- Lado esquerdo - Decorativo -->
            <div class="auth-banner">
                <div class="auth-banner-content">
                    <svg class="auth-banner-icon" viewBox="0 0 120 120" fill="none">
                        <path d="M60 20 L60 100 M20 60 L100 60" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    </svg>
                    <h2>Bem-vindo à<br>Provedor<span>Health</span></h2>
                    <p>Crie sua conta para acompanhar pedidos, salvar endereços e ter acesso a ofertas exclusivas.</p>
                    <div class="auth-banner-features">
                        <div class="feature-item">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            Rastreie seus pedidos
                        </div>
                        <div class="feature-item">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            Ofertas exclusivas
                        </div>
                        <div class="feature-item">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            Checkout mais rápido
                        </div>
                    </div>
                </div>
            </div>

            <!-- Lado direito - Formulário -->
            <div class="auth-form-side">
                <!-- Abas Login / Cadastro -->
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Entrar</button>
                    <button class="auth-tab" data-tab="cadastro">Criar Conta</button>
                </div>

                <!-- FORMULÁRIO DE LOGIN -->
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="login-email">E-mail</label>
                        <div class="input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <input type="email" id="login-email" placeholder="seu@email.com" required>
                        </div>
                        <span class="field-error" id="login-email-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="login-senha">Senha</label>
                        <div class="input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="login-senha" placeholder="Sua senha" required>
                            <button type="button" class="toggle-pass" data-target="login-senha">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <span class="field-error" id="login-senha-error"></span>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="lembrar">
                            <span class="checkmark"></span>
                            Lembrar de mim
                        </label>
                        <a href="#" class="forgot-link">Esqueci minha senha</a>
                    </div>

                    <button type="submit" class="btn-auth">
                        <span>Entrar</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>

                    <div class="auth-message" id="loginMessage"></div>
                </form>

                <!-- FORMULÁRIO DE CADASTRO -->
                <form class="auth-form hidden" id="cadastroForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cad-nome">Nome</label>
                            <div class="input-wrapper">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <input type="text" id="cad-nome" placeholder="Seu nome" required>
                            </div>
                            <span class="field-error" id="cad-nome-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="cad-sobrenome">Sobrenome</label>
                            <div class="input-wrapper">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <input type="text" id="cad-sobrenome" placeholder="Sobrenome" required>
                            </div>
                            <span class="field-error" id="cad-sobrenome-error"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="cad-cpf">CPF</label>
                        <div class="input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                            <input type="text" id="cad-cpf" placeholder="000.000.000-00" maxlength="14" required>
                        </div>
                        <span class="field-error" id="cad-cpf-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="cad-email">E-mail</label>
                        <div class="input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <input type="email" id="cad-email" placeholder="seu@email.com" required>
                        </div>
                        <span class="field-error" id="cad-email-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="cad-telefone">Telefone</label>
                        <div class="input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
                            <input type="text" id="cad-telefone" placeholder="(11) 99999-0000" maxlength="15" required>
                        </div>
                        <span class="field-error" id="cad-telefone-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="cad-senha">Senha</label>
                        <div class="input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" required>
                            <button type="button" class="toggle-pass" data-target="cad-senha">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <!-- Indicador de força da senha -->
                        <div class="password-strength">
                            <div class="strength-bars">
                                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            </div>
                            <span class="strength-text" id="strengthText"></span>
                        </div>
                        <span class="field-error" id="cad-senha-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="cad-confirma">Confirmar Senha</label>
                        <div class="input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="cad-confirma" placeholder="Repita a senha" required>
                        </div>
                        <span class="field-error" id="cad-confirma-error"></span>
                    </div>

                    <button type="submit" class="btn-auth">
                        <span>Criar Conta</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>

                    <div class="auth-message" id="cadastroMessage"></div>
                </form>
            </div>
        </div>
    </main>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span id="toastMsg">Mensagem</span>
    </div>

    <script src="./src/js/auth.js"></script>
</body>
</html>
